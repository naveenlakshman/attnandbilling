services:
  local-db:
    image: mysql:8.0
    container_name: attn_billing_local_db
    environment:
      MYSQL_ROOT_PASSWORD: admin210499_root
      MYSQL_DATABASE: attn_billing_testing
      MYSQL_USER: attn_app
      MYSQL_PASSWORD: admin210499
    ports:
      - "3308:3306"
    volumes:
      - ./scratch/production_dump.sql:/docker-entrypoint-initdb.d/production_dump.sql:ro
      - mysql_data:/var/lib/mysql
    restart: always

  web:
    build: .
    container_name: attn_billing_web
    ports:
      - "8080:8080"
    volumes:
      - ./gcp-key.json:/app/gcp-key.json:ro
    env_file:
      - .env.docker
    depends_on:
      - local-db
    restart: always

  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.22.0
    container_name: attn_billing_cloud_sql_proxy
    command:
      - "--auto-iam-authn"
      - "--address=0.0.0.0"
      - "--port=3306"
      - "global-it-edu-app:asia-south1:attn-billing-local-test-db"
    ports:
      - "3307:3306"
    volumes:
      # Windows Docker Desktop ADC path. Set GCLOUD_CONFIG_DIR explicitly if needed.
      - "${GCLOUD_CONFIG_DIR:-${APPDATA}/gcloud}:/home/nonroot/.config/gcloud:ro"
    profiles:
      - cloudsql
    restart: unless-stopped

volumes:
  mysql_data:
