services:
  local-db:
    image: mysql:8.0
    container_name: attn_billing_local_db
    environment:
      MYSQL_ROOT_PASSWORD: admin210499_root
      MYSQL_DATABASE: attn_billing_testing
      MYSQL_USER: attn_app
      MYSQL_PASSWORD: admin210499
    ports:
      - "3308:3306"
    volumes:
      - ./scratch/production_dump.sql:/docker-entrypoint-initdb.d/production_dump.sql:ro
      - mysql_data:/var/lib/mysql
    restart: always

  web:
    build: .
    container_name: attn_billing_web
    ports:
      - "8080:8080"
    volumes:
      - ./gcp-key.json:/app/gcp-key.json:ro
    env_file:
      - .env.docker
    depends_on:
      - local-db
    restart: always

volumes:
  mysql_data:
