substitutions:
  _REGION: asia-south1
  _SERVICE: attn-billing-staging
  _REPOSITORY: cloud-run-source-deploy
  _IMAGE_TAG: manual
  _REVISION_SUFFIX: candidate
  _RUNTIME_SERVICE_ACCOUNT: attn-billing-staging-runtime@global-it-erp-staging.iam.gserviceaccount.com
  _CLOUD_SQL_INSTANCE: global-it-erp-staging:asia-south1:attn-billing-staging-db
  _REDIS_HOST: 10.213.233.107

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}

  - id: deploy-zero-traffic
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --project=$PROJECT_ID
      - --region=${_REGION}
      - --platform=managed
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}
      - --revision-suffix=${_REVISION_SUFFIX}
      - --no-traffic
      - --service-account=${_RUNTIME_SERVICE_ACCOUNT}
      - --ingress=all
      - --allow-unauthenticated
      - --network=default
      - --subnet=default
      - --vpc-egress=private-ranges-only
      - --add-cloudsql-instances=${_CLOUD_SQL_INSTANCE}
      - --port=8080
      - --cpu=1
      - --memory=1Gi
      - --concurrency=10
      - --timeout=120
      - --min-instances=0
      - --max-instances=5
      - --set-env-vars=APP_ENV=production,DEBUG_MODE=false,SESSION_COOKIE_SECURE=true,SESSION_COOKIE_NAME=__Host-erp_session,SECURITY_HEADERS_ENABLED=true,PROXY_FIX_X_FOR=1,PROXY_FIX_X_PROTO=1,PROXY_FIX_X_HOST=1,TENANT_RESOLUTION_MODE=observe,DB_TYPE=mysql,DB_CONNECTION_MODE=direct,MYSQL_HOST=127.0.0.1,MYSQL_PORT=3306,MYSQL_USER=attn_app,MYSQL_DB=attn_billing_staging,MYSQL_UNIX_SOCKET=/cloudsql/${_CLOUD_SQL_INSTANCE},STORAGE_PROVIDER=gcs,GCS_BUCKET_NAME=global-it-erp-staging-storage,RATELIMIT_STORAGE_URI=redis://${_REDIS_HOST}:6379/0
      - --set-secrets=SECRET_KEY=attn-billing-staging-secret-key:2,MYSQL_PASSWORD=attn-billing-staging-mysql-password:2

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:${_IMAGE_TAG}

options:
  logging: CLOUD_LOGGING_ONLY
