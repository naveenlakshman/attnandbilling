{% extends "base.html" %}
{% block title %}{{ "Add User" if mode == "create" else "Edit User" }} - {{ company.company_short_name }}{% endblock %}
{% block page_title %}{{ "Add User" if mode == "create" else "Edit User" }}{% endblock %}

{% block content %}
<div class="card shadow-sm p-4">
  <form method="post">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control" value="{{ user.full_name if user else '' }}" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" value="{{ user.username if user else '' }}" required>
      </div>

      <div class="col-md-6">
        <label class="form-label">
          Password
          {% if mode == "edit" %}
            <small class="text-muted">(leave blank to keep existing password)</small>
          {% endif %}
        </label>
        <input type="password" name="password" class="form-control" {% if mode == "create" %}required{% endif %}>
      </div>

      <div class="col-md-6">
        <label class="form-label">Role</label>
        <select name="role" class="form-select" required>
          <option value="">Select Role</option>
          <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>Admin</option>
          <option value="staff" {% if user and user.role == 'staff' %}selected{% endif %}>Staff</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Branch</label>
        <select name="branch_id" class="form-select">
          <option value="">Select Branch</option>
          {% for branch in branches %}
            <option value="{{ branch.id }}" {% if user and user.branch_id == branch.id %}selected{% endif %}>
              {{ branch.branch_name }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-6 d-flex align-items-end">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="can_view_all_branches" value="1"
                 {% if not user or user.can_view_all_branches == 1 %}checked{% endif %}>
          <label class="form-check-label">Can view all branches</label>
        </div>
      </div>
    </div>

    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        {{ "Create User" if mode == "create" else "Save Changes" }}
      </button>
      <a href="{{ url_for('core.users') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
