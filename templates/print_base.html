<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Invoice Print{% endblock %}</title>
  <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      font-size: 10px;
    }

    html {
      margin: 0;
      padding: 0;
    }

    .print-container {
      width: 210mm;
      height: auto;
      margin: 0 auto;
      padding: 10mm;
      background: white;
    }

    @page {
      size: A4;
      margin: 5mm;
    }

    /* Ensure clean printing */
    @media print {
      body {
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
      }

      html {
        margin: 0 !important;
        padding: 0 !important;
      }

      .print-container {
        width: 100% !important;
        height: auto !important;
        padding: 10mm !important;
        max-width: 100% !important;
        margin: 0 !important;
      }

      @page {
        size: A4;
        margin: 5mm;
      }
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>
<body>

<div class="print-container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
