{% set current = assignment if assignment is defined else none %}
<fieldset class="border rounded p-3">
  <legend class="float-none w-auto px-2 fs-6 fw-bold">Optional grading and completion</legend>
  <div class="row g-3">
    <div class="col-md-6"><label class="form-label">Due date and time</label><input type="datetime-local" name="due_at" class="form-control" value="{{ current.due_at.strftime('%Y-%m-%dT%H:%M') if current and current.due_at and current.due_at.strftime is defined else (current.due_at[:16]|replace(' ', 'T') if current and current.due_at else '') }}"></div>
    <div class="col-md-6"><label class="form-label">Maximum attempts</label><input type="number" name="max_attempts" min="1" max="100" class="form-control" value="{{ current.max_attempts if current and current.max_attempts else '' }}" placeholder="Unlimited"></div>
    <div class="col-md-6"><label class="form-label">Grading mode</label><select name="grading_mode" class="form-select" data-grading-mode><option value="accept_reject" {{ 'selected' if not current or current.grading_mode == 'accept_reject' }}>Accept / reject only</option><option value="numeric" {{ 'selected' if current and current.grading_mode == 'numeric' }}>Numeric score</option><option value="rubric" {{ 'selected' if current and current.grading_mode == 'rubric' }}>Rubric</option><option value="numeric_rubric" {{ 'selected' if current and current.grading_mode == 'numeric_rubric' }}>Numeric score plus rubric</option></select></div>
    <div class="col-md-3"><label class="form-label">Maximum score</label><input type="number" name="max_score" min="0" step="0.01" class="form-control" value="{{ current.max_score if current and current.max_score is not none else '' }}"></div>
    <div class="col-md-3"><label class="form-label">Passing score</label><input type="number" name="passing_score" min="0" step="0.01" class="form-control" value="{{ current.passing_score if current and current.passing_score is not none else '' }}"></div>
    <div class="col-md-6"><label class="form-label">Rubric</label><select name="rubric_id" class="form-select"><option value="">No rubric</option>{% for rubric in rubrics %}<option value="{{ rubric.id }}" {{ 'selected' if current and current.rubric_id == rubric.id }}>{{ rubric.name }}</option>{% endfor %}</select><div class="form-text">Rubrics must be configured before selecting rubric grading.</div></div>
    <div class="col-md-6"><label class="form-label">Topic completion rule</label><select name="completion_rule" class="form-select"><option value="accepted_submission" {{ 'selected' if not current or current.completion_rule == 'accepted_submission' }}>Accepted submission</option><option value="score_meets_passing_score" {{ 'selected' if current and current.completion_rule == 'score_meets_passing_score' }}>Score meets passing score</option><option value="all_required_assignments_accepted" {{ 'selected' if current and current.completion_rule == 'all_required_assignments_accepted' }}>All required assignments accepted</option><option value="any_required_assignment_accepted" {{ 'selected' if current and current.completion_rule == 'any_required_assignment_accepted' }}>Any required assignment accepted</option><option value="manual_topic_completion" {{ 'selected' if current and current.completion_rule == 'manual_topic_completion' }}>Manual topic completion</option><option value="does_not_affect_topic_completion" {{ 'selected' if current and current.completion_rule == 'does_not_affect_topic_completion' }}>Does not affect topic completion</option></select></div>
    <div class="col-12 d-flex flex-wrap gap-4"><div class="form-check"><input type="checkbox" class="form-check-input" id="allowLate" name="allow_late_submission" value="1" {{ 'checked' if not current or current.allow_late_submission }}><label class="form-check-label" for="allowLate">Allow late submissions</label></div><div class="form-check"><input type="checkbox" class="form-check-input" id="assignmentRequired" name="is_required" value="1" {{ 'checked' if not current or current.is_required }}><label class="form-check-label" for="assignmentRequired">Required assignment</label></div></div>
  </div>
</fieldset>
