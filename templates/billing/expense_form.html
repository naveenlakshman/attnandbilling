{% extends "billing/base.html" %}

{% block title %}Add Expense - ERP{% endblock %}

{% block content %}

<style>
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    font-weight: 500;
    margin-bottom: 6px;
    display: block;
  }

  .form-control {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
  }

  textarea.form-control {
    resize: vertical;
  }

  .form-actions {
    margin-top: 20px;
  }
</style>

<div class="page-header">
  <h2>Add Expense</h2>
</div>

<div class="card">
  <form method="POST">

    <!-- Top Grid -->
    <div class="form-grid">

      <div class="form-group">
        <label>Expense Date *</label>
        <input type="date" name="expense_date" value="{{ today }}" class="form-control" required>
      </div>

      <div class="form-group">
        <label>Branch *</label>
        <select name="branch_id" class="form-control" required>
          <option value="">Select Branch</option>
          {% for b in branches %}
          <option value="{{ b.id }}">{{ b.branch_name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Category *</label>
        <select name="category_id" class="form-control" required>
          <option value="">Select Category</option>
          {% for c in categories %}
          <option value="{{ c.id }}">{{ c.category_name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Amount *</label>
        <input type="number" step="0.01" name="amount" class="form-control" required>
      </div>

    </div>

    <!-- Title -->
    <div class="form-group">
      <label>Title *</label>
      <input type="text" name="title" class="form-control" placeholder="Example: March electricity bill" required>
    </div>

    <!-- Payment -->
    <div class="form-grid">

      <div class="form-group">
        <label>Payment Mode *</label>
        <select name="payment_mode" class="form-control" required>
          <option value="">Select Mode</option>
          <option value="cash">Cash</option>
          <option value="upi">UPI</option>
          <option value="bank_transfer">Bank Transfer</option>
          <option value="card">Card</option>
        </select>
      </div>

      <div class="form-group">
        <label>Reference No</label>
        <input type="text" name="reference_no" class="form-control" placeholder="Txn ID / UTR / Ref No">
      </div>

    </div>

    <!-- Notes -->
    <div class="form-group">
      <label>Notes</label>
      <textarea name="notes" rows="3" class="form-control" placeholder="Optional notes"></textarea>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Expense</button>
      <a href="{{ url_for('billing.expenses') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>

{% endblock %}
