  <!-- Leads Tab -->

    <span class="nav-icon">👥</span>
    <span>Leads</span>
    <div class="nav-submenu">
      <a href="{{ url_for('leads.lead_create') }}">➕ New Lead</a>
      <a href="{{ url_for('leads.followups_today') }}">📞 Followups</a>
      <a href="{{ url_for('leads.dashboard') }}">🎯 Dashboard</a>

  </div>

  <!-- Billing Tab -->
  <div class="mobile-nav-item {{ 'active' if request.endpoint and (request.endpoint.startswith('billing.') or request.endpoint.startswith('baddebt.')) else '' }}" onclick="toggleMobileSubmenu(event, this)">
    <span class="nav-icon">💰</span>
    <span>Billing</span>
    <div class="nav-submenu">
      <a href="{{ url_for('billing.student_new') }}">🎓 + Student</a>
      <a href="{{ url_for('billing.receipts') }}">💵 + Receipts</a>
      <a href="{{ url_for('billing.invoice_new') }}">📄 + Invoice</a>
      <a href="{{ url_for('billing.receivables') }}">🧾 Receivables</a>

    </div>

  <!-- Attendance Tab -->
  <div class="mobile-nav-item {{ 'active' if request.endpoint and request.endpoint.startswith('attendance.') else '' }}" onclick="toggleMobileSubmenu(event, this)">
    <span class="nav-icon">📋</span>
    <span>Attend</span>
    <div class="nav-submenu">
      <a href="{{ url_for('attendance.list_batches') }}">✅ Mark Attend</a>
      <a href="{{ url_for('attendance.leave_requests') }}">🔔 Leaves</a>

  <!-- LMS Tab -->
  <div class="mobile-nav-item {{ 'active' if request.endpoint and (request.endpoint.startswith('lms_admin.') or request.endpoint.startswith('exams.')) else '' }}" onclick="toggleMobileSubmenu(event, this)">
    <span class="nav-icon">📚</span>

    <div class="nav-submenu">

    </div>
  </div>
</nav>

<script>
function toggleMobileSubmenu(event, element) {
  event.stopPropagation();
  const submenu = element.querySelector('.nav-submenu');
  if (!submenu) return;
  const isAlreadyOpen = submenu.classList.contains('show');
  
  // Close all other menus first
  document.querySelectorAll('.nav-submenu').forEach(m => {
    m.classList.remove('show');
  });
  
  if (!isAlreadyOpen) {
    submenu.classList.add('show');
    
    // Add close listener
    const closeListener = (e) => {
      if (!element.contains(e.target)) {
        submenu.classList.remove('show');
        document.removeEventListener('click', closeListener);
      }
    };
    setTimeout(() => {
      document.addEventListener('click', closeListener);
    }, 50);
  }
}
</script>
